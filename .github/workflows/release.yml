name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  validate-release:
    name: Validate release
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Validate release tag
        id: release
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          TAG="$RELEASE_TAG"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must match vX.Y.Z, got $TAG." >&2
            exit 1
          fi

          git fetch --force origin \
            "+refs/heads/main:refs/remotes/origin/main" \
            "+refs/tags/${TAG}:refs/tags/${TAG}"

          TAG_COMMIT="$(git rev-parse "refs/tags/${TAG}^{commit}")"
          CHECKOUT_COMMIT="$(git rev-parse HEAD)"
          if [[ "$CHECKOUT_COMMIT" != "$TAG_COMMIT" ]]; then
            echo "Checked out $CHECKOUT_COMMIT, but release tag $TAG resolves to $TAG_COMMIT." >&2
            exit 1
          fi

          if ! git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
            echo "Release tag $TAG ($TAG_COMMIT) must be reachable from origin/main." >&2
            exit 1
          fi

          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate version metadata
        id: metadata
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          TAG="$RELEASE_TAG"
          VERSION="${TAG#v}"
          CORE_VERSION="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "mint-core") | .version')"
          CLI_VERSION="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "mint-cli") | .version')"
          CLI_CORE_REQ="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "mint-cli") | .dependencies[] | select(.name == "mint-core") | .req')"

          if [[ "$CORE_VERSION" != "$VERSION" || "$CLI_VERSION" != "$VERSION" ]]; then
            echo "Tag $TAG must match mint-core $CORE_VERSION and mint-cli $CLI_VERSION." >&2
            exit 1
          fi
          if [[ "$CLI_CORE_REQ" != "^$VERSION" ]]; then
            echo "Internal mint-core dependency versions must match ^$VERSION." >&2
            echo "mint-cli requires $CLI_CORE_REQ." >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-artifacts:
    needs: validate-release
    permissions:
      contents: read
    uses: ./.github/workflows/release-build.yml
    with:
      ref: refs/tags/${{ needs.validate-release.outputs.tag_name }}

  publish-release-assets:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: [validate-release, build-artifacts]
    permissions:
      contents: write

    steps:
      - name: Download CLI distributions
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          pattern: cli-dist-*
          path: dist
          merge-multiple: true

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag_name }}
        run: gh release upload "$RELEASE_TAG" dist/* --clobber

  publish-crates:
    name: Publish crates
    runs-on: ubuntu-latest
    needs: [validate-release, build-artifacts, publish-release-assets]
    environment: crates
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          ref: refs/tags/${{ needs.validate-release.outputs.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Extract workspace version
        id: metadata
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.validate-release.outputs.version }}
        run: |
          echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check mint-core publish status
        id: core_status
        shell: bash
        run: |
          VERSION="${{ steps.metadata.outputs.version }}"
          if curl -fsSL -H "User-Agent: mint-release-workflow" "https://crates.io/api/v1/crates/mint-core/${VERSION}" >/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "mint-core ${VERSION} is already published."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check mint-cli publish status
        id: cli_status
        shell: bash
        run: |
          VERSION="${{ steps.metadata.outputs.version }}"
          if curl -fsSL -H "User-Agent: mint-release-workflow" "https://crates.io/api/v1/crates/mint-cli/${VERSION}" >/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "mint-cli ${VERSION} is already published."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate with crates.io
        if: steps.core_status.outputs.published != 'true' || steps.cli_status.outputs.published != 'true'
        id: auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe

      - name: Check mint-core package
        if: steps.core_status.outputs.published != 'true'
        run: cargo publish --locked --dry-run -p mint-core

      - name: Publish mint-core
        if: steps.core_status.outputs.published != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --locked -p mint-core

      - name: Wait for mint-core index
        if: steps.cli_status.outputs.published != 'true'
        shell: bash
        run: |
          VERSION="${{ steps.metadata.outputs.version }}"
          for attempt in {1..30}; do
            if curl -fsSL -H "User-Agent: mint-release-workflow" "https://crates.io/api/v1/crates/mint-core/${VERSION}" >/dev/null; then
              exit 0
            fi
            echo "Waiting for mint-core ${VERSION} to appear on crates.io (${attempt}/30)."
            sleep 10
          done
          echo "mint-core ${VERSION} did not appear on crates.io in time." >&2
          exit 1

      - name: Check mint-cli package
        if: steps.cli_status.outputs.published != 'true'
        run: cargo publish --locked --dry-run -p mint-cli

      - name: Publish mint-cli
        if: steps.cli_status.outputs.published != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --locked -p mint-cli

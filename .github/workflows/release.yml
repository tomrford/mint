name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

env:
  CICD_INTERMEDIATES_DIR: "_cicd-intermediates"

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_REPO: ${{ github.repository }}
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Install Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Verify tag is on main
        shell: bash
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must match vX.Y.Z, got $TAG." >&2
            exit 1
          fi
          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate version metadata
        id: metadata
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag_name }}"
          VERSION="${TAG#v}"
          CORE_VERSION="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "mint-core") | .version')"
          CLI_VERSION="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "mint-cli") | .version')"
          CLI_CORE_REQ="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "mint-cli") | .dependencies[] | select(.name == "mint-core") | .req')"
          PY_CORE_REQ="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "mint-python") | .dependencies[] | select(.name == "mint-core") | .req')"
          PY_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("crates/mint-python/pyproject.toml", "rb"))["project"]["version"])')"

          if [[ "$CORE_VERSION" != "$VERSION" || "$CLI_VERSION" != "$VERSION" ]]; then
            echo "Tag $TAG must match mint-core $CORE_VERSION and mint-cli $CLI_VERSION." >&2
            exit 1
          fi
          if [[ "$CLI_CORE_REQ" != "^$VERSION" || "$PY_CORE_REQ" != "^$VERSION" ]]; then
            echo "Internal mint-core dependency versions must match ^$VERSION." >&2
            echo "mint-cli requires $CLI_CORE_REQ; mint-python requires $PY_CORE_REQ." >&2
            exit 1
          fi
          if [[ "$PY_VERSION" != "$VERSION" ]]; then
            echo "Python project version $PY_VERSION does not match tag $TAG." >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure release exists
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
          else
            gh release create "$TAG" --generate-notes
          fi

  build-release:
    name: ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        job:
          - {
              target: x86_64-unknown-linux-musl,
              os: ubuntu-latest,
              use-cross: true,
            }
          - {
              target: aarch64-unknown-linux-musl,
              os: ubuntu-latest,
              use-cross: true,
            }
          - { target: x86_64-apple-darwin, os: macos-15-intel }
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }

    env:
      BUILD_CMD: cargo

    steps:
      - name: Checkout source code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          ref: refs/tags/${{ needs.create-release.outputs.tag_name }}

      - name: Extract crate metadata
        shell: bash
        run: |
          echo "PROJECT_NAME=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "mint-cli") | .targets[] | select(.kind[] == "bin") | .name')" >> $GITHUB_ENV
          echo "PROJECT_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "mint-cli") | .version')" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: ${{ matrix.job.target }}

      - name: Install cross
        if: matrix.job.use-cross
        uses: taiki-e/install-action@3771e22aa892e03fd35585fae288baad1755695c
        with:
          tool: cross

      - name: Overwrite build command
        if: matrix.job.use-cross
        shell: bash
        run: echo "BUILD_CMD=cross" >> $GITHUB_ENV

      - name: Build
        shell: bash
        run: $BUILD_CMD build --locked --release --target=${{ matrix.job.target }} -p mint-cli --bin mint

      - name: Build archive
        shell: bash
        run: |
          EXE_SUFFIX=""
          case ${{ matrix.job.target }} in
            *-pc-windows-*) EXE_SUFFIX=".exe" ;;
          esac

          BIN_NAME="${PROJECT_NAME}${EXE_SUFFIX}"
          BIN_PATH="target/${{ matrix.job.target }}/release/${BIN_NAME}"

          PKG_SUFFIX=".tar.gz"
          case ${{ matrix.job.target }} in
            *-pc-windows-*) PKG_SUFFIX=".zip" ;;
          esac

          PKG_BASENAME="${PROJECT_NAME}-v${PROJECT_VERSION}-${{ matrix.job.target }}"
          PKG_NAME="${PKG_BASENAME}${PKG_SUFFIX}"

          PKG_STAGING="${CICD_INTERMEDIATES_DIR}/package"
          ARCHIVE_DIR="${PKG_STAGING}/${PKG_BASENAME}/"
          mkdir -p "${ARCHIVE_DIR}"

          cp "${BIN_PATH}" "${ARCHIVE_DIR}"
          cp README.md LICENSE* "${ARCHIVE_DIR}" 2>/dev/null || true

          pushd "${PKG_STAGING}/" >/dev/null
          case ${{ matrix.job.target }} in
            *-pc-windows-*)
              7z a "${PKG_NAME}" "${PKG_BASENAME}"/* | tail -2
              certutil -hashfile "${PKG_NAME}" SHA256 > "${PKG_NAME}.sha256"
              ;;
            *)
              tar czf "${PKG_NAME}" "${PKG_BASENAME}"/*
              shasum -a 256 "${PKG_NAME}" > "${PKG_NAME}.sha256"
              ;;
          esac
          popd >/dev/null

          echo "PKG_PATH=${PKG_STAGING}/${PKG_NAME}" >> $GITHUB_ENV
          echo "PKG_CHECKSUM=${PKG_STAGING}/${PKG_NAME}.sha256" >> $GITHUB_ENV

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.create-release.outputs.tag_name }}"
          gh release upload "$TAG" "${{ env.PKG_PATH }}" "${{ env.PKG_CHECKSUM }}" --clobber

  build-python:
    name: Python ${{ matrix.job.name }}
    runs-on: ${{ matrix.job.os }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        job:
          - { name: linux-x86_64, os: ubuntu-latest, sdist: true }
          - { name: macos-x86_64, os: macos-15-intel, sdist: false }
          - { name: macos-aarch64, os: macos-latest, sdist: false }
          - { name: windows-x86_64, os: windows-latest, sdist: false }

    steps:
      - name: Checkout source code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          ref: refs/tags/${{ needs.create-release.outputs.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Install Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.10"

      - name: Install uv
        shell: bash
        run: python -m pip install --upgrade uv

      - name: Build Linux wheel
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@12dee64e4a21f3a4a4fd4d34e05cc55f0eda098a
        with:
          command: build
          manylinux: "2014"
          working-directory: crates/mint-python
          args: --release --out ../../dist

      - name: Fix Linux dist permissions
        if: runner.os == 'Linux'
        run: sudo chown -R "$USER":"$USER" dist

      - name: Build native wheel
        if: runner.os != 'Linux'
        shell: bash
        run: uv run --directory crates/mint-python --group dev maturin build --release --compatibility pypi --out ../../dist

      - name: Build source distribution
        if: matrix.job.sdist
        shell: bash
        run: uv run --directory crates/mint-python --group dev maturin sdist --out ../../dist

      - name: Test built wheel
        shell: bash
        run: |
          WHEEL="$(find dist -maxdepth 1 -name '*.whl' | head -n 1)"
          uv venv .venv-wheel
          PYTHON=.venv-wheel/bin/python
          if [[ ! -x "$PYTHON" ]]; then
            PYTHON=.venv-wheel/Scripts/python.exe
          fi
          uv pip install --python "$PYTHON" "$WHEEL" pytest
          "$PYTHON" -m pytest crates/mint-python/tests

      - name: Test source distribution
        if: matrix.job.sdist
        shell: bash
        run: |
          SDIST="$(find dist -maxdepth 1 -name '*.tar.gz' | head -n 1)"
          uv venv .venv-sdist
          PYTHON=.venv-sdist/bin/python
          if [[ ! -x "$PYTHON" ]]; then
            PYTHON=.venv-sdist/Scripts/python.exe
          fi
          uv pip install --python "$PYTHON" "$SDIST" pytest
          "$PYTHON" -m pytest crates/mint-python/tests

      - name: Upload Python distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: python-dist-${{ matrix.job.name }}
          path: dist/*
          if-no-files-found: error

  publish-crates:
    name: Publish crates
    runs-on: ubuntu-latest
    needs: [create-release, build-release, build-python]
    environment: crates
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          ref: refs/tags/${{ needs.create-release.outputs.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Extract workspace version
        id: metadata
        shell: bash
        run: |
          echo "version=${{ needs.create-release.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Check mint-core publish status
        id: core_status
        shell: bash
        run: |
          VERSION="${{ steps.metadata.outputs.version }}"
          if curl -fsSL -H "User-Agent: mint-release-workflow" "https://crates.io/api/v1/crates/mint-core/${VERSION}" >/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "mint-core ${VERSION} is already published."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check mint-cli publish status
        id: cli_status
        shell: bash
        run: |
          VERSION="${{ steps.metadata.outputs.version }}"
          if curl -fsSL -H "User-Agent: mint-release-workflow" "https://crates.io/api/v1/crates/mint-cli/${VERSION}" >/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "mint-cli ${VERSION} is already published."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate with crates.io
        if: steps.core_status.outputs.published != 'true' || steps.cli_status.outputs.published != 'true'
        id: auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe

      - name: Check mint-core package
        if: steps.core_status.outputs.published != 'true'
        run: cargo publish --locked --dry-run -p mint-core

      - name: Publish mint-core
        if: steps.core_status.outputs.published != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --locked -p mint-core

      - name: Wait for mint-core index
        if: steps.cli_status.outputs.published != 'true'
        shell: bash
        run: |
          VERSION="${{ steps.metadata.outputs.version }}"
          for attempt in {1..30}; do
            if curl -fsSL -H "User-Agent: mint-release-workflow" "https://crates.io/api/v1/crates/mint-core/${VERSION}" >/dev/null; then
              exit 0
            fi
            echo "Waiting for mint-core ${VERSION} to appear on crates.io (${attempt}/30)."
            sleep 10
          done
          echo "mint-core ${VERSION} did not appear on crates.io in time." >&2
          exit 1

      - name: Check mint-cli package
        if: steps.cli_status.outputs.published != 'true'
        run: cargo publish --locked --dry-run -p mint-cli

      - name: Publish mint-cli
        if: steps.cli_status.outputs.published != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --locked -p mint-cli

  publish-pypi:
    name: Publish PyPI package
    runs-on: ubuntu-latest
    needs: [build-python, publish-crates]
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          pattern: python-dist-*
          path: dist
          merge-multiple: true

      - name: Publish Python distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: dist/
          skip-existing: true

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g., v1.0.0)"
        required: true
        type: string

permissions:
  contents: read

env:
  CICD_INTERMEDIATES_DIR: "_cicd-intermediates"

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_REPO: ${{ github.repository }}
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"

      - name: Ensure release exists
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
          else
            gh release create "$TAG" --generate-notes
          fi

  build-release:
    name: ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        job:
          - {
              target: x86_64-unknown-linux-musl,
              os: ubuntu-latest,
              use-cross: true,
            }
          - {
              target: aarch64-unknown-linux-musl,
              os: ubuntu-latest,
              use-cross: true,
            }
          - { target: x86_64-apple-darwin, os: macos-15-intel }
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }

    env:
      BUILD_CMD: cargo

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Extract crate metadata
        shell: bash
        run: |
          echo "PROJECT_NAME=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "mint-cli") | .targets[] | select(.kind[] == "bin") | .name')" >> $GITHUB_ENV
          echo "PROJECT_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "mint-cli") | .version')" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.job.target }}

      - name: Install cross
        if: matrix.job.use-cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Overwrite build command
        if: matrix.job.use-cross
        shell: bash
        run: echo "BUILD_CMD=cross" >> $GITHUB_ENV

      - name: Build
        shell: bash
        run: $BUILD_CMD build -p mint-cli --bin mint --locked --release --target=${{ matrix.job.target }}

      - name: Build archive
        shell: bash
        run: |
          EXE_SUFFIX=""
          case ${{ matrix.job.target }} in
            *-pc-windows-*) EXE_SUFFIX=".exe" ;;
          esac

          BIN_NAME="${PROJECT_NAME}${EXE_SUFFIX}"
          BIN_PATH="target/${{ matrix.job.target }}/release/${BIN_NAME}"

          PKG_SUFFIX=".tar.gz"
          case ${{ matrix.job.target }} in
            *-pc-windows-*) PKG_SUFFIX=".zip" ;;
          esac

          PKG_BASENAME="${PROJECT_NAME}-v${PROJECT_VERSION}-${{ matrix.job.target }}"
          PKG_NAME="${PKG_BASENAME}${PKG_SUFFIX}"

          PKG_STAGING="${CICD_INTERMEDIATES_DIR}/package"
          ARCHIVE_DIR="${PKG_STAGING}/${PKG_BASENAME}/"
          mkdir -p "${ARCHIVE_DIR}"

          cp "${BIN_PATH}" "${ARCHIVE_DIR}"
          cp README.md LICENSE* "${ARCHIVE_DIR}" 2>/dev/null || true

          pushd "${PKG_STAGING}/" >/dev/null
          case ${{ matrix.job.target }} in
            *-pc-windows-*)
              7z a "${PKG_NAME}" "${PKG_BASENAME}"/* | tail -2
              certutil -hashfile "${PKG_NAME}" SHA256 > "${PKG_NAME}.sha256"
              ;;
            *)
              tar czf "${PKG_NAME}" "${PKG_BASENAME}"/*
              shasum -a 256 "${PKG_NAME}" > "${PKG_NAME}.sha256"
              ;;
          esac
          popd >/dev/null

          echo "PKG_PATH=${PKG_STAGING}/${PKG_NAME}" >> $GITHUB_ENV
          echo "PKG_CHECKSUM=${PKG_STAGING}/${PKG_NAME}.sha256" >> $GITHUB_ENV

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.create-release.outputs.tag_name }}"
          gh release upload "$TAG" "${{ env.PKG_PATH }}" "${{ env.PKG_CHECKSUM }}" --clobber

  publish-crates:
    name: Publish crates
    runs-on: ubuntu-latest
    needs: build-release
    environment: crates
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Extract crate version
        id: metadata
        shell: bash
        run: |
          echo "version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "mint-cli") | .version')" >> "$GITHUB_OUTPUT"

      - name: Check publish status for mint-core
        id: mint_core_status
        shell: bash
        run: |
          CRATE="mint-core"
          VERSION="${{ steps.metadata.outputs.version }}"
          if curl -fsSL -H "User-Agent: mint-release-workflow" "https://crates.io/api/v1/crates/${CRATE}/${VERSION}" >/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "${CRATE} ${VERSION} is already published."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check package mint-core
        if: steps.mint_core_status.outputs.published != 'true'
        run: cargo publish -p mint-core --locked --dry-run

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1.0.4

      - name: Publish mint-core to crates.io
        if: steps.mint_core_status.outputs.published != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p mint-core --locked

      - name: Wait for mint-core index
        if: steps.mint_core_status.outputs.published != 'true'
        shell: bash
        run: |
          VERSION="${{ steps.metadata.outputs.version }}"
          for attempt in {1..30}; do
            if curl -fsSL -H "User-Agent: mint-release-workflow" "https://crates.io/api/v1/crates/mint-core/${VERSION}" >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          echo "mint-core ${VERSION} was not visible on crates.io in time."
          exit 1

      - name: Check publish status for mint-cli
        id: mint_cli_status
        shell: bash
        run: |
          CRATE="mint-cli"
          VERSION="${{ steps.metadata.outputs.version }}"
          if curl -fsSL -H "User-Agent: mint-release-workflow" "https://crates.io/api/v1/crates/${CRATE}/${VERSION}" >/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "${CRATE} ${VERSION} is already published."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check package mint-cli
        if: steps.mint_cli_status.outputs.published != 'true'
        run: cargo publish -p mint-cli --locked --dry-run

      - name: Publish mint-cli to crates.io
        if: steps.mint_cli_status.outputs.published != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p mint-cli --locked

name: Release dry run

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit to rehearse
        required: true
        default: main
        type: string
      tag:
        description: Release tag whose version metadata should be validated
        required: true
        default: v2.0.0
        type: string

permissions:
  contents: read

jobs:
  validate:
    name: Validate release candidate
    runs-on: ubuntu-latest
    outputs:
      commit: ${{ steps.source.outputs.commit }}
      version: ${{ steps.metadata.outputs.version }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Install Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Validate source ref
        id: source
        shell: bash
        run: |
          git fetch --force origin "+refs/heads/main:refs/remotes/origin/main"
          COMMIT="$(git rev-parse 'HEAD^{commit}')"
          if ! git merge-base --is-ancestor "$COMMIT" origin/main; then
            echo "Release candidate $COMMIT must be reachable from origin/main." >&2
            exit 1
          fi
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"

      - name: Validate version metadata
        id: metadata
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          TAG="$RELEASE_TAG"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must match vX.Y.Z, got $TAG." >&2
            exit 1
          fi

          VERSION="${TAG#v}"
          CORE_VERSION="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "mint-core") | .version')"
          CLI_VERSION="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "mint-cli") | .version')"
          PY_CRATE_VERSION="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "mint-python") | .version')"
          CLI_CORE_REQ="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "mint-cli") | .dependencies[] | select(.name == "mint-core") | .req')"
          PY_CORE_REQ="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "mint-python") | .dependencies[] | select(.name == "mint-core") | .req')"
          PY_VERSION_IS_DYNAMIC="$(python -c 'import tomllib; project = tomllib.load(open("crates/mint-python/pyproject.toml", "rb"))["project"]; print(str("version" in project.get("dynamic", [])).lower())')"

          if [[ "$CORE_VERSION" != "$VERSION" || "$CLI_VERSION" != "$VERSION" || "$PY_CRATE_VERSION" != "$VERSION" ]]; then
            echo "Tag $TAG must match mint-core $CORE_VERSION, mint-cli $CLI_VERSION, and mint-python $PY_CRATE_VERSION." >&2
            exit 1
          fi
          if [[ "$CLI_CORE_REQ" != "^$VERSION" || "$PY_CORE_REQ" != "^$VERSION" ]]; then
            echo "Internal mint-core dependency versions must match ^$VERSION." >&2
            echo "mint-cli requires $CLI_CORE_REQ; mint-python requires $PY_CORE_REQ." >&2
            exit 1
          fi
          if [[ "$PY_VERSION_IS_DYNAMIC" != "true" ]]; then
            echo "mint-python must declare version as dynamic in pyproject.toml; Cargo metadata is the release version source." >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-artifacts:
    needs: validate
    permissions:
      contents: read
    uses: ./.github/workflows/release-build.yml
    with:
      ref: ${{ needs.validate.outputs.commit }}

  check-crates:
    name: Check crate packages
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout source code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          ref: ${{ needs.validate.outputs.commit }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Check mint-core package
        run: cargo publish --locked --dry-run -p mint-core

      - name: Package crate archives
        run: cargo package --locked --no-verify -p mint-core -p mint-cli

      - name: Inspect crate contents
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          tar -tzf "target/package/mint-core-${RELEASE_VERSION}.crate"
          tar -tzf "target/package/mint-cli-${RELEASE_VERSION}.crate"

      - name: Verify packaged mint-cli against packaged mint-core
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          STAGE="$(mktemp -d)"
          tar -xzf "target/package/mint-core-${RELEASE_VERSION}.crate" -C "$STAGE"
          tar -xzf "target/package/mint-cli-${RELEASE_VERSION}.crate" -C "$STAGE"
          cargo check \
            --manifest-path "$STAGE/mint-cli-${RELEASE_VERSION}/Cargo.toml" \
            --offline \
            --config "patch.crates-io.mint-core.path='$STAGE/mint-core-${RELEASE_VERSION}'"

      - name: Upload crate packages
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: crate-dist
          path: target/package/*.crate
          if-no-files-found: error

  summarize:
    name: Summarize release artifacts
    runs-on: ubuntu-latest
    needs: [validate, build-artifacts, check-crates]

    steps:
      - name: Download CLI distributions
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          pattern: cli-dist-*
          path: dist
          merge-multiple: true

      - name: Download Python distributions
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          pattern: python-dist-*
          path: dist
          merge-multiple: true

      - name: Download crate packages
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: crate-dist
          path: dist

      - name: Create artifact manifest
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
          SOURCE_COMMIT: ${{ needs.validate.outputs.commit }}
        run: |
          find dist -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
          {
            echo "## Release dry run"
            echo
            echo "Version: \`${RELEASE_VERSION}\`"
            echo
            echo "Commit: \`${SOURCE_COMMIT}\`"
            echo
            echo "### Artifacts"
            echo
            while IFS= read -r path; do
              echo "- \`$(basename "$path")\`"
            done < <(find dist -maxdepth 1 -type f | sort)
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-dry-run-manifest
          path: SHA256SUMS
          if-no-files-found: error
